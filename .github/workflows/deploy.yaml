name: Deploy React Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      REPO_NAME: ${{ github.event.repository.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare image name
        id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${OWNER}/${REPO}:latest"

          echo "image_name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./.deploy/prod/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.image_name }}

      - name: Debug runner network
        run: |
          echo "GitHub runner public IP:"
          curl -s https://api.ipify.org || true
          echo ""

          echo "Check SSH port 22:"
          timeout 15 bash -c "cat < /dev/null > /dev/tcp/${{ secrets.SERVER_IP }}/22" && echo "SSH port reachable" || echo "SSH port NOT reachable"

      - name: Deploy Frontend on server
        run: |
          set -e

          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          for i in 1 2 3 4 5; do
            echo "SSH deploy attempt $i..."

            ssh \
              -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=3 \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
                set -e

                cd \$HOME/${{ env.REPO_NAME }}/

                docker compose pull
                docker compose up -d --force-recreate

                docker image prune -af
              " && break

            echo "SSH failed, retrying in 20 seconds..."
            sleep 20

            if [ "$i" = "5" ]; then
              echo "SSH deploy failed after 5 attempts"
              exit 1
            fi
          done
